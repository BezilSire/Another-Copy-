
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ubuntium | Community Hub</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0f172a"/>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            midnight: {
              DEFAULT: '#0f172a',
              light: '#1e293b',
              lighter: '#334155'
            },
            brand: {
              gold: '#D4AF37',
              goldlight: '#FFD76A',
              green: '#22c55e'
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'slide-up': 'slideUp 0.4s ease-out forwards'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            slideUp: { '0%': { transform: 'translateY(10px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } }
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.3)',
            'premium': '0 20px 40px -10px rgba(0, 0, 0, 0.5)'
          }
        },
      },
    }
  </script>
  <style>
    body { 
      background-color: #020617;
      color: #f1f5f9;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .fintech-card {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    input, select, textarea {
      background: #1e293b !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 0.75rem !important;
      padding: 0.75rem 1rem !important;
      color: white !important;
      font-size: 0.95rem !important;
      transition: all 0.2s ease !important;
    }

    input:focus {
      border-color: #D4AF37 !important;
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2) !important;
    }

    .label-simple {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        display: block;
        margin-bottom: 0.5rem;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "buffer": "https://esm.sh/buffer@^6.0.3",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "qrcode": "https://esm.sh/qrcode@^1.5.4",
    "tweetnacl": "https://esm.sh/tweetnacl@^1.0.3",
    "bip39": "https://esm.sh/bip39@^3.1.0",
    "html5-qrcode": "https://esm.sh/html5-qrcode@^2.3.8",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "fs": "https://esm.sh/fs@^0.0.1-security",
    "path": "https://esm.sh/path@^0.12.7"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
